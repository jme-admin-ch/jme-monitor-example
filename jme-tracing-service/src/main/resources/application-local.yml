server:
  port: 8091
loguri: http://localhost:8090/jme-log-service/

logging:
  level:
    # Show the log lines from this service's controller
    ch.admin.bit.jeap.jme.tracing: DEBUG
    # Show the log lines for incoming requests written by jeap-spring-boot-rest-request-tracing
    ch.admin.bit.jeap.log.RestRequestTracer: DEBUG

# Push traces to the local LGTM stack started via docker/docker-compose.yml.
# Without this property set, Spring Boot does not export traces (they are still
# generated and visible as trace/span ids in MDC and the log).
management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
