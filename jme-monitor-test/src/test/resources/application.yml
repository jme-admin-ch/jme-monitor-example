spring:
  application:
    name: jme-monitor-it
  main:
    banner-mode: off
  # Starts/stops docker/docker-compose.yml (OTel Collector + Tempo) for TracingExportIT to query.
  # Harmless for MonitorExampleIT, which shares this Spring context configuration but doesn't use it.
  docker:
    compose:
      enabled: true
      file: ../docker/docker-compose.yml
      lifecycle-management: start-and-stop
      skip:
        in-tests: false
      arguments:
        - "--project-name=${COMPOSE_PROJECT_NAME:jme-monitor-it}"
      readiness:
        timeout: 90s
